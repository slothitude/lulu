name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v4.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2/MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            make
            zip

      - name: Determine version
        shell: msys2 {0}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.tag }}" >> $GITHUB_ENV
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
          echo "Building release for $TAG"

      - name: CMake configure (fetches RyuGraph)
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release .. 2>&1 || true
          # Configure will fail due to missing patches, but FetchContent downloads the source

      - name: Patch RyuGraph for MinGW
        shell: msys2 {0}
        run: |
          cd build/_deps/kuzu-src

          # 1. helpers.h — add cstdint
          if [ -f src/include/c_api/helpers.h ]; then
            sed -i '1i #include <cstdint>' src/include/c_api/helpers.h
            echo "Patched helpers.h"
          fi

          # 2. helpers.cpp — add cstdint
          if [ -f src/c_api/helpers.cpp ]; then
            sed -i '1i #include <cstdint>' src/c_api/helpers.cpp
            echo "Patched helpers.cpp"
          fi

          # 3. local_file_system.cpp — add sys/stat.h
          if [ -f src/common/file_system/local_file_system.cpp ]; then
            sed -i '1i #include <sys/stat.h>' src/common/file_system/local_file_system.cpp
            echo "Patched local_file_system.cpp"
          fi

          # 4. buffer_manager.cpp — guard SEH for MinGW (no _set_se_translator)
          BM=src/storage/buffer_manager/buffer_manager.cpp
          if [ -f "$BM" ]; then
            python -c "
          import sys
          with open('$BM', 'r') as f: c = f.read()
          # Wrap the SEH block (uses _set_se_translator) with _MSC_VER guard
          c = c.replace('#if defined(WIN32)\nclass AccessViolation',
                         '#if defined(WIN32) && defined(_MSC_VER)\nclass AccessViolation')
          # Also add MinGW fallback for the optimistic read section
          c = c.replace('#if defined(_WIN32) && !defined(_MSC_VER) && !BM_MALLOC',
                         '#if defined(_WIN32) && !defined(_MSC_VER) && !BM_MALLOC')
          with open('$BM', 'w') as f: f.write(c)
          print('Patched buffer_manager.cpp')
          "
          fi

          # 5. glob.hpp — use getenv instead of _dupenv_s for non-MSVC
          if [ -f third_party/glob/glob/glob.hpp ]; then
            sed -i 's/_dupenv_s(\&result, \&length, name)/(result = getenv(name), length = result ? strlen(result) : 0, (void)0)/' third_party/glob/glob/glob.hpp
            echo "Patched glob.hpp"
          fi

          # 6. CMakeLists.txt — add ws2_32 for WIN32 linking
          if [ -f src/CMakeLists.txt ]; then
            sed -i '/WIN32/,/endif()/ s/set(RYU_LIBRARIES/set(RYU_LIBRARIES ws2_32/' src/CMakeLists.txt
            echo "Patched src/CMakeLists.txt"
          fi

          echo "All patches applied"

      - name: Re-configure + Build
        shell: msys2 {0}
        run: |
          cd build
          # Remove CMake cache to force reconfigure with patched sources
          rm -f CMakeCache.txt
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . -- -j$(nproc)
          cp _deps/kuzu-build/src/libryu_shared.dll .

      - name: Build tool DLLs
        shell: msys2 {0}
        run: |
          mkdir -p tools
          for f in runtime/tools/*.c; do
            name=$(basename "$f" .c)
            echo "Building $name.dll"
            gcc -shared -std=c11 -D_CRT_SECURE_NO_WARNINGS -DTOOL_BUILDING_DLL \
              -I runtime/src/include \
              "$f" runtime/src/cJSON.c runtime/src/sandbox.c \
              -o "tools/$name.dll" 2>/dev/null || \
              echo "  SKIP $name (missing deps)"
          done

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p "dist/lulu-${TAG}-win64/tools" "dist/lulu-${TAG}-win64/state" \
                   "dist/lulu-${TAG}-win64/workspace" "dist/lulu-${TAG}-win64/tg_data"
          cp build/agent.exe build/libryu_shared.dll build/updater.exe "dist/lulu-${TAG}-win64/"
          cp agent.json "dist/lulu-${TAG}-win64/"
          cp tools/*.dll "dist/lulu-${TAG}-win64/tools/" 2>/dev/null || true

          echo '{"model":"glm-5.1","endpoint":"https://api.z.ai/api/coding/paas/v4/chat/completions","apikey":"","max_tokens":4096,"temperature":0.7}' > "dist/lulu-${TAG}-win64/config.json"
          echo "{\"version\":\"${TAG}\"}" > "dist/lulu-${TAG}-win64/install.json"

          cd dist
          zip -r "lulu-${TAG}-win64.zip" "lulu-${TAG}-win64/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lulu-${{ env.TAG }}-win64
          path: dist/lulu-${{ env.TAG }}-win64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Lulu ${{ env.TAG }}
          draft: true
          generate_release_notes: true
          files: dist/lulu-${{ env.TAG }}-win64.zip
